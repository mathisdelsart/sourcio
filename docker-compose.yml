# The persistent vector store runs in Docker; the FastAPI API and the Streamlit
# UI run on the host (`make api` / `make ui`), where the local embedding model
# (bge-m3 via torch) is already set up. This keeps the container light and avoids
# shipping multi-gigabyte ML wheels — the standard split for an ML app.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP / REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # The qdrant image ships neither curl nor wget, so probe the REST port
      # over a raw TCP connection using the bundled bash.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  # Optional PostgreSQL backend for the relational store (students, exercises,
  # grades, history). Gated behind the `postgres` compose profile so it is NOT
  # started by the default `docker compose up -d qdrant`; bring it up explicitly
  # with `docker compose --profile postgres up -d postgres`. The development
  # default remains local SQLite (`sqlite:///./app.db`); switch by setting
  # `DATABASE_URL=postgresql+psycopg://...`. See docs/POSTGRES.md.
  postgres:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      # Documented defaults; override via the environment or an `.env` file. The
      # matching app URL is postgresql+psycopg://<user>:<pass>@localhost:5432/<db>.
      POSTGRES_USER: ${POSTGRES_USER:-grounded}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grounded}
      POSTGRES_DB: ${POSTGRES_DB:-grounded}
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grounded} -d ${POSTGRES_DB:-grounded}"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_storage:
