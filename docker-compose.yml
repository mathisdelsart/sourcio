# Local development services.
#
# Only the vector store runs in Docker. The API (`make api`) and the Next.js web
# app (`make web`) run on the host, where the local embedding model (bge-m3 via
# torch) already lives — containerizing them locally would pull multi-gigabyte ML
# wheels for no benefit. The production API *is* containerized; see `Dockerfile`.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP / REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # The qdrant image ships neither curl nor wget, so probe the REST port
      # over a raw TCP connection using the bundled bash.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  # PostgreSQL for the relational store (users, students, exercises, grades,
  # history).
  #
  # Local dev defaults to SQLite and needs none of this. A DEPLOYMENT does: a
  # container's filesystem is ephemeral, so a SQLite file inside it -- and every
  # account in it -- is wiped on the next rebuild or sleep/wake. Production runs on
  # a managed Postgres (Neon), and this service exists so that path can be
  # exercised locally before shipping it.
  #
  # It sits behind the `postgres` profile, so `docker compose up -d qdrant` does not
  # start it. Bring it up explicitly:
  #   docker compose --profile postgres up -d postgres
  # then point the app at it: DATABASE_URL=postgresql+psycopg://...
  # See docs/OPERATIONS.md.
  postgres:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      # Documented defaults; override via the environment or an `.env` file. The
      # matching app URL is postgresql+psycopg://<user>:<pass>@localhost:5432/<db>.
      POSTGRES_USER: ${POSTGRES_USER:-grounded}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grounded}
      POSTGRES_DB: ${POSTGRES_DB:-grounded}
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grounded} -d ${POSTGRES_DB:-grounded}"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_storage:
