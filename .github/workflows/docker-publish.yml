name: Docker Publish

# Build the CPU-only API image (root Dockerfile) and push it to the GitHub
# Container Registry (GHCR) when a version tag (v*) is pushed. A manual
# workflow_dispatch trigger is also provided for ad-hoc rebuilds. No external
# secrets are required: the built-in GITHUB_TOKEN authenticates to GHCR.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Derive tags from the pushed git tag (e.g. v1.2.3 -> 1.2.3, 1.2, 1)
          # and publish a moving `latest` tag for the most recent release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          # The Dockerfile expects the repository root as build context.
          context: .
          file: ./Dockerfile
          # CPU-only build for a single amd64 target (the Dockerfile installs a
          # CPU-only torch from PyTorch's CPU wheel index).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
