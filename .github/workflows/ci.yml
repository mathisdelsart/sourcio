name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev --extra api --extra agent --extra obs --extra ui

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uvx pyright

      - name: Tests
        # Measure coverage over the application packages (configured in
        # pyproject.toml) and fail if it regresses below the threshold. The
        # term-missing report is printed to the job log for inspection.
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=84
