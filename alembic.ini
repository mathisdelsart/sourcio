# Alembic configuration.
#
# The database URL is intentionally NOT set here. It is resolved at runtime in
# ``alembic/env.py`` from ``config.get_settings().database_url`` so SQLite and
# PostgreSQL are swapped by configuration alone.

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url is set programmatically in env.py; do not hardcode it here.

[post_write_hooks]
# No post-write hooks configured.

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
